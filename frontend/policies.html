<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Policies - Insurance Management</title>
  <link rel="stylesheet" href="css/global.css">
</head>
<body>
  <nav class="navbar">
    <div class="navbar-brand">Insurance 2026</div>
    <ul class="navbar-nav">
      <li><a href="dashboard.html">Dashboard</a></li>
      <li><a href="clients.html">Clients</a></li>
      <li><a href="agents.html">Agents</a></li>
      <li><a href="policies.html">Policies</a></li>
      <li><a href="claims.html">Claims</a></li>
      <li><a href="payouts.html">Payouts</a></li>
    </ul>
  </nav>

  <div class="container">
    <div class="flex" style="justify-content: space-between; align-items: center; margin-bottom: 24px;">
      <h1>Policy Management</h1>
      <button class="btn-neon" onclick="showAddPolicyForm()">+ Add Policy</button>
    </div>

    <!-- Add/Edit Form -->
    <div id="policyForm" class="glass-card mb-3" style="display: none;">
      <h2 id="formTitle">Add New Policy</h2>
      <form id="policyFormElement" class="flex flex-column gap-2">
        <input type="hidden" id="policyId">
        
        <input type="text" id="policyNumber" class="glass-input" placeholder="Policy Number (e.g., POL-2024-001)" required>
        
        <select id="clientId" class="glass-input" required>
          <option value="">Select Client</option>
        </select>
        
        <select id="agentId" class="glass-input" required>
          <option value="">Select Agent</option>
        </select>
        
        <select id="policyTypeId" class="glass-input" required>
          <option value="">Select Policy Type</option>
        </select>
        
        <div class="flex gap-2">
          <input type="date" id="startDate" class="glass-input" placeholder="Start Date" required>
          <input type="date" id="endDate" class="glass-input" placeholder="End Date" required>
        </div>
        
        <div class="flex gap-2">
          <input type="number" step="0.01" id="premiumAmount" class="glass-input" placeholder="Premium Amount" required>
          <input type="number" step="0.01" id="coverageAmount" class="glass-input" placeholder="Coverage Amount" required>
        </div>
        
        <select id="status" class="glass-input">
          <option value="active">Active</option>
          <option value="expired">Expired</option>
          <option value="cancelled">Cancelled</option>
        </select>
        
        <div class="flex gap-2">
          <button type="submit" class="btn-neon">Save Policy</button>
          <button type="button" class="btn-neon" onclick="hidePolicyForm()">Cancel</button>
        </div>
      </form>
    </div>

    <!-- Policy List -->
    <div class="glass-card">
      <h2 class="mb-2">All Policies</h2>
      <div id="loadingSpinner" class="spinner" style="margin: 40px auto;"></div>
      <div id="policyTableContainer" style="display: none;">
        <table class="glass-table">
          <thead>
            <tr>
              <th>Policy #</th>
              <th>Client</th>
              <th>Agent</th>
              <th>Type</th>
              <th>Premium</th>
              <th>Coverage</th>
              <th>Start Date</th>
              <th>End Date</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="policyTableBody">
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="js/supabase-api.js"></script>
  <script src="js/policies.js"></script>
  
  <style>
    .status-badge {
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
    }
    .status-active {
      background: rgba(57, 255, 20, 0.2);
      color: var(--neon-green);
    }
    .status-expired {
      background: rgba(255, 0, 110, 0.2);
      color: var(--neon-pink);
    }
    .status-cancelled {
      background: rgba(255, 255, 255, 0.2);
      color: rgba(255, 255, 255, 0.7);
    }
    /* Add to the style section */
select {
  background: rgba(255, 255, 255, 0.1) !important;
  color: #fff !important;
  padding: 12px 16px;
  border: 1px solid rgba(255, 255, 255, 0.2);
  border-radius: 8px;
  appearance: none;
  background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23ffffff'%3e%3cpath d='M7 10l5 5 5-5z'/%3e%3c/svg%3e");
  background-repeat: no-repeat;
  background-position: right 12px center;
  background-size: 16px;
  padding-right: 32px;
}

select option {
  background: rgba(30, 30, 30, 0.9);
  color: #fff;
}
  </style>
</body>
</html>
